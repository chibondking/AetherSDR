name: Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia'

      - name: Configure
        shell: cmd
        run: |
          cmake -B build -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=cl ^
            -DCMAKE_CXX_COMPILER=cl

      - name: Build
        shell: cmd
        run: cmake --build build --config Release -j%NUMBER_OF_PROCESSORS%

      - name: Deploy Qt
        shell: cmd
        run: |
          mkdir deploy
          copy build\AetherSDR.exe deploy\
          windeployqt deploy\AetherSDR.exe --release --no-translations --no-system-d3d-compiler

      - name: Create installer (ZIP)
        shell: pwsh
        run: |
          Compress-Archive -Path deploy\* -DestinationPath "AetherSDR-${{ github.ref_name }}-Windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Installer
          path: AetherSDR-*.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: AetherSDR-*.zip
